<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <img src="TOR.jpg" alt="The Organic Route" class="logo">
            <span class="nav-title">The ORGANIC ROUTE</span> 
        </div>
    </nav> 

    <div class="signup-container">
        <h2>Create Your Account</h2>
        <form id="signup-form" onsubmit="handleSignup(event)">
            <div class="form-row">
                <input type="text" placeholder="Enter your First Name" required>
                <input type="text" placeholder="Enter your Last Name" required>
            </div>
            <div class="form-row">
                <input type="email" placeholder="Enter your Email" required>
                <input type="tel" placeholder="Enter your Mobile Number" required>
            </div>
            <div class="form-row">
                <input type="date" id="dob" placeholder="Date of Birth" required>
                <input type="number" id="age" placeholder="Your Age" readonly required>
            </div>
            <div class="form-row">
                <input type="password" placeholder="Create your Password" required>
                <input type="password" placeholder="Confirm your Password" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p>By clicking the sign up button, you agree to our <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a></p>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script>
        document.getElementById('dob').addEventListener('change', function() {
            const dob = new Date(this.value);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const monthDiff = today.getMonth() - dob.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            document.getElementById('age').value = age;
        });

        function handleSignup(event) {
            event.preventDefault();
            alert('Signup Successful!');
            document.getElementById('signup-form').reset();
            window.location.href = 'services.html'; // Redirect to services.html after sign up
        }
    </script>
</body>
</html>
